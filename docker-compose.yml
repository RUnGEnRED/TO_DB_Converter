version: '3.8'

services:
  # MongoDB - baza docelowa
  mongodb:
    image: mongo:7.0
    container_name: todbconverter-mongo-test
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

  # PostgreSQL - baza zrodlowa
  postgres:
    image: postgres:16-alpine
    container_name: todbconverter-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: source_db
    command: >
      postgres
      -c log_statement=all
      -c pg_hba.conf=/var/lib/postgresql/data/pg_hba.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  # pgAdmin - interfejs do podgladu PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: todbconverter-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  mongo-data:
  postgres-data:
