# PostgreSQL Configuration
postgres.host=localhost
postgres.port=5433
postgres.database=source_db
postgres.username=postgres
postgres.password=postgres
postgres.schema=public
postgres.dropExistingTables=true

# MongoDB Configuration
mongo.host=localhost
mongo.port=27018
mongo.database=target_db
mongo.username=admin
mongo.password=admin

# Conversion Direction
# Options: MONGO_TO_POSTGRES, POSTGRES_TO_MONGO
conversion.direction=POSTGRES_TO_MONGO

# Relationship Strategy (for Mongo -> Postgres conversion)
# Options: embedding (default), referencing
# embedding: embed related documents
# referencing: store only reference IDs
relationship.strategy=embedding

# Schema Design Patterns (MongoDB-specific optimizations)
# Attribute Pattern: group similar columns (e.g., release_US, release_France -> releases[])
# Enabled: true/false, Threshold: min similar columns to group
pattern.attribute.enabled=true
pattern.attribute.threshold=3

# Bucket Pattern: group data into buckets (e.g., customer transactions)
# Enabled: true/false, Size: max items per bucket
pattern.bucket.enabled=false
pattern.bucket.size=10

# Subset Pattern: separate frequently accessed data
# Enabled: true/false, Limit: max items in main document
pattern.subset.enabled=false
pattern.subset.limit=10

# Outlier Pattern: isolate large documents
# Enabled: true/false, Threshold: max array size before outlier
pattern.outlier.enabled=false
pattern.outlier.threshold=50